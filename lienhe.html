<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liên hệ với 12A2</title>

<link href="https://fonts.googleapis.com/index?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:monospace;
    background:linear-gradient(180deg,#ffd6ec,#d6f0ff,#fff5c2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}


.home-fixed-btn{
    position: fixed;
    bottom: 25px;
    left: 25px;
    background: linear-gradient(135deg, #ff9ecf, #ff6fb5);
    color: white;
    padding: 12px 22px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    z-index: 999;
}

.home-fixed-btn:hover{
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}


.contact-box{
    background:white;
    padding:40px;
    border-radius:25px;
    width:350px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    color:#ff4fa3;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:15px;
    border:2px solid #ffd6ec;
    font-family:'Baloo 2';
    outline:none;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff4fa3;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff79c6;
}

.message{
    margin-top:15px;
    color:green;
    font-weight:600;
}
</style>
</head>

<body>

<div class="contact-box">
    <h1>Liên hệ với 12A2 💌</h1>

    <input type="text" id="name" placeholder="Nhập họ tên của bạn">

    <textarea id="content" placeholder="Viết nội dung bạn muốn gửi đến 12A2..."></textarea>

    <button onclick="sendMessage()">Gửi</button>

    <div class="message" id="thankMessage"></div>
</div>

<script>
function sendMessage(){
    let name = document.getElementById("name").value;
    let content = document.getElementById("content").value;

    if(name === "" || content === ""){
        alert("Vui lòng nhập đầy đủ thông tin nhé 🌸");
        return;
    }

    document.getElementById("thankMessage").innerHTML =
    "Cảm ơn " + name + " đã gửi lời nhắn đến tập thể 12A2 💖 Chúng mình trân trọng từng lời chia sẻ của bạn và sẽ phản hồi trong vòng 24 giờ. Chúc bạn một ngày thật nhiều niềm vui và yêu thương! 🌸✨";

    document.getElementById("name").value="";
    document.getElementById("content").value="";
}
</script>

<a href="index.html" class="home-fixed-btn">
    ⬅ Về Trang Chủ
</a>

</body>

</html>
